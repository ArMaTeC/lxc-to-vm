# Example Proxmox VE API token for cluster operations
# 
# Use with: --api-host <host> --api-token <token>
#
# Creating a token:
#   pveum user token add root@pam conversion-token --privsep=0
#
# Token format: USER@REALM!TOKENNAME=UUID
# 
# Example:
#   --api-host pve-node2.local
#   --api-token "root@pam!conversion-token=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
#
# Note: --migrate-to-local requires a token with appropriate privileges
# to migrate containers between cluster nodes.
