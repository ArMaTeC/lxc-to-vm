# ==============================================================================
# vm-to-lxc.sh — Example API Token Configuration
# ==============================================================================
#
# Proxmox VE API tokens allow cluster-wide operations without password auth.
# This is useful when converting VMs that may be on remote cluster nodes.
#
# 1. Create an API token in Proxmox:
#    pveum user token add root@pam vm-to-lxc --privsep=0
#
# 2. Use the token with vm-to-lxc.sh:
#    sudo ./vm-to-lxc.sh -v 200 -c 100 -s local-lvm \
#        --api-host 10.0.0.1 \
#        --api-token "root@pam!vm-to-lxc=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" \
#        --migrate-to-local
#
# Notes:
#   - --migrate-to-local requires PVE.Migrate and VM.Migrate privileges
#   - The API host should be the cluster master or any reachable node
#   - Self-signed certificates are accepted (curl -k)
#   - Token format: USER@REALM!TOKENID=SECRET
# ==============================================================================
